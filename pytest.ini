[pytest]
# pytest configuration for EchoConnect backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test organization
markers =
    critical: Critical production tests
    schema: Response schema validation tests
    progression: Curriculum progression tests
    integration: Integration tests
    slow: Slow running tests

# Test paths
testpaths = backend/tests

# Timeout for tests (seconds)
timeout = 30
timeout_method = thread

# Minimum Python version
minversion = 6.0
